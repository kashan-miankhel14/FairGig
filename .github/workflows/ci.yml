name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  # ── Build all Docker images ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/auth_service/Dockerfile
          push: false
          tags: fairgig/auth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build earnings-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/earnings_service/Dockerfile
          push: false
          tags: fairgig/earnings-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build anomaly-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/anomaly_service/Dockerfile
          push: false
          tags: fairgig/anomaly-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build analytics-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/analytics_service/Dockerfile
          push: false
          tags: fairgig/analytics-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build grievance-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/grievance_service/Dockerfile
          push: false
          tags: fairgig/grievance-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build certificate-renderer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/certificate_renderer/Dockerfile
          push: false
          tags: fairgig/certificate-renderer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend Docker build is only done in deploy.yml (push to main)
      # Skipped here because it requires env vars and takes 5+ minutes

  # ── Type check frontend ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck
