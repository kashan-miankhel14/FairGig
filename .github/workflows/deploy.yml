name: Deploy — Build, Push to ECR & Deploy to EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: fairgig-cluster
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Login to Amazon ECR ───────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Set image tag (short commit SHA) ──────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── 5. Set up Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Build & Push all images ───────────────────────────────────────
      - name: Build & Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/auth_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-auth:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push earnings-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/earnings_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-earnings:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-earnings:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push anomaly-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/anomaly_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-anomaly:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-anomaly:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push analytics-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/analytics_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-analytics:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-analytics:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push grievance-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/grievance_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-grievance:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-grievance:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push certificate-renderer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/certificate_renderer/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-certificate:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-certificate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/fairgig-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/fairgig-frontend:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Update kubeconfig for EKS ─────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # ── 8. Update image tags in K8s manifests and deploy ─────────────────
      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          ECR=${{ env.ECR_REGISTRY }}

          # Update each deployment with new image tag
          kubectl set image deployment/auth-service \
            auth-service=${ECR}/fairgig-auth:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/earnings-service \
            earnings-service=${ECR}/fairgig-earnings:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/anomaly-service \
            anomaly-service=${ECR}/fairgig-anomaly:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/analytics-service \
            analytics-service=${ECR}/fairgig-analytics:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/grievance-service \
            grievance-service=${ECR}/fairgig-grievance:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/certificate-renderer \
            certificate-renderer=${ECR}/fairgig-certificate:${IMAGE_TAG} -n fairgig

          kubectl set image deployment/frontend \
            frontend=${ECR}/fairgig-frontend:${IMAGE_TAG} -n fairgig

      # ── 9. Wait for rollout to complete ──────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/auth-service -n fairgig --timeout=120s
          kubectl rollout status deployment/earnings-service -n fairgig --timeout=120s
          kubectl rollout status deployment/anomaly-service -n fairgig --timeout=120s
          kubectl rollout status deployment/analytics-service -n fairgig --timeout=120s
          kubectl rollout status deployment/grievance-service -n fairgig --timeout=120s
          kubectl rollout status deployment/certificate-renderer -n fairgig --timeout=120s
          kubectl rollout status deployment/frontend -n fairgig --timeout=120s

      # ── 10. Verify deployment ─────────────────────────────────────────────
      - name: Verify pods are running
        run: kubectl get pods -n fairgig
